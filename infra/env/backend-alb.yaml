AWSTemplateFormatVersion: "2010-09-09"
Description: ALB for FarmMapping backend.

Parameters:
  AppName:
    Type: String
    Default: farmmapping
    Description: Prefix for exported names.
  ContainerPort:
    Type: Number
    Default: 8080
    Description: Container port exposed by the Spring app.
  HealthCheckPath:
    Type: String
    Default: /actuator/health
    Description: Health check path for the target group.
  AlbIngressCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to reach the ALB.

Resources:
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP to ALB.
      VpcId: !ImportValue
        Fn::Sub: "${AppName}-vpc-id"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AlbIngressCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AppName}-alb"
      Scheme: internet-facing
      Subnets: !Split
        - ","
        - !ImportValue
          Fn::Sub: "${AppName}-public-subnet-ids"
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Type: application

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AppName}-tg"
      VpcId: !ImportValue
        Fn::Sub: "${AppName}-vpc-id"
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: !Ref HealthCheckPath
      Matcher:
        HttpCode: 200-399

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

Outputs:
  AlbArn:
    Value: !Ref ApplicationLoadBalancer
    Export:
      Name: !Sub "${AppName}-alb-arn"
  AlbDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName
    Export:
      Name: !Sub "${AppName}-alb-dns"
  AlbSecurityGroupId:
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub "${AppName}-alb-sg-id"
  TargetGroupArn:
    Value: !Ref AppTargetGroup
    Export:
      Name: !Sub "${AppName}-tg-arn"
