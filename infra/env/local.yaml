AWSTemplateFormatVersion: "2010-09-09"
Description: Local environment stack for FarmMapping.
Parameters:
  MapTilesBucketName:
    Type: String
    Description: Name of the map tiles S3 bucket.
  EnableMapTilesVersioning:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: Enable S3 versioning for map tiles.
  BlockMapTilesPublicAccess:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: Block all public access to the map tiles bucket.
Conditions:
  MapTilesVersioningEnabled: !Equals [!Ref EnableMapTilesVersioning, "true"]
  MapTilesBlockPublicAccessEnabled: !Equals [!Ref BlockMapTilesPublicAccess, "true"]
Resources:
  MapTilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref MapTilesBucketName
      VersioningConfiguration: !If
        - MapTilesVersioningEnabled
        - Status: Enabled
        - !Ref "AWS::NoValue"
      PublicAccessBlockConfiguration: !If
        - MapTilesBlockPublicAccessEnabled
        - BlockPublicAcls: true
          IgnorePublicAcls: true
          BlockPublicPolicy: true
          RestrictPublicBuckets: true
        - !Ref "AWS::NoValue"
      Tags:
        - Key: Environment
          Value: local
        - Key: Purpose
          Value: map-tiles
Outputs:
  MapTilesBucketName:
    Value: !Ref MapTilesBucket
  MapTilesBucketArn:
    Value: !GetAtt MapTilesBucket.Arn
