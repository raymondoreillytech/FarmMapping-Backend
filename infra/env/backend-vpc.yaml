AWSTemplateFormatVersion: "2010-09-09"
Description: Exports default VPC and public subnets for backend stacks.

Parameters:
  AppName:
    Type: String
    Default: farmmapping
    Description: Prefix for exported names.
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Default VPC id.
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Default VPC public subnet ids.
  PublicRouteTableIds:
    Type: List<String>
    Description: Route table ids used by the public subnets.

Resources:
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      VpcId: !Ref VpcId
      RouteTableIds: !Ref PublicRouteTableIds

  VpcExportsHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

Outputs:
  VpcId:
    Value: !Ref VpcId
    Export:
      Name: !Sub "${AppName}-vpc-id"
  PublicSubnetIds:
    Value: !Join [",", !Ref PublicSubnetIds]
    Export:
      Name: !Sub "${AppName}-public-subnet-ids"
  S3GatewayEndpointId:
    Value: !Ref S3GatewayEndpoint
    Export:
      Name: !Sub "${AppName}-s3-gateway-endpoint-id"
