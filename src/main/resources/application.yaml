spring:
  datasource:
    # Use RDS URL on AWS, default to local PostgreSQL
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/farmmapping}
    username: ${SPRING_DATASOURCE_USERNAME:farmmapping}
    password: ${SPRING_DATASOURCE_PASSWORD:farmmapping}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:20MB}
      max-request-size: ${MAX_REQUEST_SIZE:20MB}

# Allow port configuration (critical for AWS App Runner or ECS)
server:
  port: ${PORT:8080}

app:
  storage:
    s3:
      bucket-name: ${TREE_PHOTO_S3_BUCKET:farmmapping-tree-observation}
      key-prefix: ${TREE_PHOTO_S3_KEY_PREFIX:trees}
      region: ${TREE_PHOTO_S3_REGION:${AWS_REGION:eu-west-1}}
      endpoint: ${TREE_PHOTO_S3_ENDPOINT:}
      force-path-style: ${TREE_PHOTO_S3_FORCE_PATH_STYLE:false}
      download-url-ttl: ${TREE_PHOTO_S3_DOWNLOAD_URL_TTL:15m}
  tiles:
    base-url: ${TILES_BASE_URL:http://localhost:4566/farmmapping-map-tiles-local}
  inference:
    base-url: ${TREE_INFERENCE_BASE_URL:http://localhost:8000}
    connect-timeout: ${TREE_INFERENCE_CONNECT_TIMEOUT:5s}
    read-timeout: ${TREE_INFERENCE_READ_TIMEOUT:30s}

logging:
  level:
    org.flywaydb: INFO
